<span class="icon-text mr-2">
    <span class="icon has-text-grey"><i class="fas fa-tag"></i></span>
    <span>
        {% for tag in include.tags %}
            <a class="has-text-grey" href="/tag?tag={{ tag }}">
                <span class="hover-blue">{{ tag }}</span>
            </a>
        {% endfor %}
    </span>
</span>
