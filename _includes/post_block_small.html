<a href="{{ include.post.url }}" class="has-text-text">
    <div class="post-block-small p-4">
        <div>{{ include.post.title }}</div>
        <span class="has-text-grey">{{ include.post.date | date: "%Y-%m-%d" }}</span>
        <span class="has-text-grey">{{ include.post.tags | join: ' ' }}</span>
    </div>
</a>
