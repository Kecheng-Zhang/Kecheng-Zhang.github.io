<div class="container is-max-tablet my-6">
    <div class="columns">
        <div class="column">
            <div class="title is-1">{{include.title}}</div>
            <div class="subtitle is-3 is-family-code has-text-link-70">{{include.subtitle}}</div>
        </div>
        <div class="column">
            <div class="level">
                <div class="level-left"></div>
                <div class="level-right">
                    <div class="top-right-decoration" style="border-top: 5px solid var(--default-blue); border-right: 5px solid var(--default-blue); height: 3rem; width: 3rem;"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="block">{{include.description}}</div>
</div>
