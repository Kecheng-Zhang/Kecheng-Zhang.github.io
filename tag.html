---
layout: base
title: 标签分类
subtitle: Tag - [ ]
description: 这里展示了包含标签 [ ] 的文章。
---
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlParam = new URLSearchParams(window.location.search);
        tag = urlParam.get('tag');
        tag = decodeURIComponent(tag);
        document.getElementById('page-subtitle').textContent = 'Tag - ' + tag;
        document.getElementById('page-desc').textContent = '这里展示了包含标签 ' + tag + ' 的文章。';

        // 隐藏不包含当前标签的文章
        const otherPosts = document.querySelectorAll('[data-tags]:not([data-tags*="' + tag + '"])');
        otherPosts.forEach(post => {
            post.style.display = 'none';
        });
    });
</script>

{% include title_section.html title=page.title subtitle=page.subtitle description=page.description %}

<hr class="container is-max-tablet">

<!-- 显示置顶的blog文章 -->
<div class="container is-max-tablet my-6">
    {% for post in site.posts %}
        {% include post_block.html post=post %}
    {% endfor %}
</div>
